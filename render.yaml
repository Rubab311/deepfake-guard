# render.yaml – Render deployment configuration
# Render auto-detects this file when you connect your GitHub repo.

services:
  - type: web
    name: deepfake-guard-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python start.py

    envVars:
      - key: PORT
        value: 8080
      - key: DEBUG
        value: false
      - key: MODEL_TYPE
        value: efficientnet
      - key: MODEL_PATH
        value: models/deepfake_efficientnet.pth
      - key: DEVICE
        value: cpu
      - key: MAX_FILE_SIZE_MB
        value: 50
      - key: DEEPFAKE_THRESHOLD
        value: "0.5"
      # Set CORS_ORIGINS in Render dashboard after Vercel deploy:
      # CORS_ORIGINS=https://your-app.vercel.app

    healthCheckPath: /api/health
    autoDeploy: true
